name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint Python (pyflakes — unused imports/vars, undefined names)
        run: pyflakes server.py tools mcp_server.py tests

      - name: Check front-end module syntax
        run: for f in static/js/*.js; do node --check "$f"; done

      - name: Run JS unit tests (tax calculator)
        run: node --test tests/*.js

      - name: Run Python unit tests
        run: pytest tests/ -v
