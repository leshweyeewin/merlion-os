name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  # Allows the refresh-seeds workflow (and manual runs) to trigger a deploy after it commits
  # fresh .gov.sg seeds — a commit pushed with GITHUB_TOKEN does not itself re-fire `on: push`.
  workflow_dispatch: {}

env:
  PROJECT_ID: "gen-lang-client-0985772581"
  REGION: asia-southeast1
  SERVICE_NAME: merlion-os

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and Push Container Image
        run: |
          IMAGE_TAG="asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/merlion-os-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud artifacts repositories create merlion-os-repo --repository-format=docker --location=asia-southeast1 --quiet || true
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/merlion-os-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # Runtime config. GCP_PROJECT_ID is non-secret; the API keys are mounted from GCP
          # Secret Manager (secrets: `lta-key`, `gemini-key`, `datagovsg-key`), NOT GitHub
          # secrets. Declaring them here means every CI deploy re-mounts them, so a deploy can
          # never silently drop a manually-added secret. The runtime service account needs
          # roles/secretmanager.secretAccessor on each secret.
          env_vars: |
            GCP_PROJECT_ID=${{ env.PROJECT_ID }}
          secrets: |
            LTA_DATAMALL_API_KEY=lta-key:latest
            GEMINI_API_KEY=gemini-key:latest
            DATA_GOV_SG_API_KEY=datagovsg-key:latest
          flags: |
            --allow-unauthenticated
            --min-instances=1
            --memory=1Gi
            --cpu=1
